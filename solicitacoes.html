<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitações de Atividades</title>
  <link rel="stylesheet" href="global.css" />
</head>
<body>
  <div class="header">
    <h1>Solicitações de Atividades</h1>
    <a href="dashbord.html">Voltar</a>
  </div>

  <div class="content">
    <div class="filtro">
      <div>Filtrar por Status:</div>
      <select id="filtro-status">
        <option value="">Todos</option>
        <option value="pendente">Pendente</option>
        <option value="aprovado">Aprovado</option>
        <option value="rejeitado">Rejeitado</option>
      </select>
    </div>

    <div class="card">
      <div class="tabela-wrap">
        <table>
          <thead>
            <tr>
              <th>Aluno</th>
              <th>Atividade</th>
              <th>Categoria</th>
              <th>Horas</th>
              <th>Certificado</th>
              <th>Data</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-solicitacoes">
            <tr><td colspan="8" style="text-align:center;color:#888;">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal Aprovar -->
  <div class="modal-overlay" id="modal-aprovar">
    <div class="modal">
      <div class="modal-header">
        <h2>Aprovar Solicitação</h2>
        <button class="modal-fechar" onclick="fecharModalAprovar()">×</button>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Horas a Validar</label>
        <input type="number" id="horas-validadas" min="1" placeholder="Informe as horas aprovadas"
          style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-top:4px;" />
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label>Observação (opcional)</label>
        <textarea id="obs-aprovar" rows="3"
          style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;"
          placeholder="Comentário para o aluno..."></textarea>
      </div>
      <input type="hidden" id="id-aprovar" />
      <input type="hidden" id="horas-solicitadas-aprovar" />
      <button class="btn btn-primary" style="width:100%" onclick="confirmarAprovar()">Confirmar Aprovação</button>
    </div>
  </div>

  <!-- Modal Rejeitar -->
  <div class="modal-overlay" id="modal-rejeitar">
    <div class="modal">
      <div class="modal-header">
        <h2>Rejeitar Solicitação</h2>
        <button class="modal-fechar" onclick="fecharModalRejeitar()">×</button>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label>Motivo da Rejeição</label>
        <textarea id="obs-rejeitar" rows="3"
          style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;"
          placeholder="Explique o motivo da rejeição..."></textarea>
      </div>
      <input type="hidden" id="id-rejeitar" />
      <button class="btn btn-secondary" style="width:100%" onclick="confirmarRejeitar()">Confirmar Rejeição</button>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    function badgeStatus(status) {
      const cores = {
        pendente:  'color:#92400e;background:#fef3c7;border-color:#fde68a;',
        aprovado:  'color:#065f46;background:#d1fae5;border-color:#6ee7b7;',
        rejeitado: 'color:#991b1b;background:#fee2e2;border-color:#fca5a5;'
      };
      const s = (status || '').toLowerCase();
      return `<span class="badge" style="${cores[s] || ''}">${status}</span>`;
    }

    async function carregarSolicitacoes() {
      const status = document.getElementById('filtro-status').value;
      const tbody = document.getElementById('tabela-solicitacoes');
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#888;">Carregando...</td></tr>';

      try {
        const lista = await solicitacoes.listar(status);
        if (lista.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#888;">Nenhuma solicitação encontrada.</td></tr>';
          return;
        }
        tbody.innerHTML = lista.map(s => {
          const aluno    = s.idAluno    ? s.idAluno.nome      : '—';
          const categoria = s.idCategoria ? s.idCategoria.nome : '—';
          const data     = s.dataEnvio  ? new Date(s.dataEnvio).toLocaleDateString('pt-BR') : '—';
          const obs      = s.avaliacao  && s.avaliacao.observacao ? s.avaliacao.observacao : '—';
          const statusLower = (s.status || '').toLowerCase();
          const temCertificado = s.certificado && s.certificado.nomeArquivo;

          const linkCert = temCertificado
            ? `<a href="${API_URL}/solicitacoes/${s._id}/certificado" target="_blank"
                style="color:#2563eb;font-size:12px;font-weight:600;">📄 Ver PDF</a>`
            : '<span style="color:#ccc;font-size:12px;">—</span>';

          const acoes = statusLower === 'pendente'
            ? `<div class="btn-group">
                <button class="btn btn-primary" onclick="abrirAprovar('${s._id}', ${s.cargaHoraria})">Aprovar</button>
                <button class="btn btn-secondary" onclick="abrirRejeitar('${s._id}')">Rejeitar</button>
               </div>`
            : `<span style="color:#888;font-size:13px;">${obs !== '—' ? obs : 'Concluído'}</span>`;

          return `
          <tr>
            <td>${aluno}</td>
            <td>${s.titulo}</td>
            <td>${categoria}</td>
            <td>${s.cargaHoraria}h</td>
            <td>${linkCert}</td>
            <td>${data}</td>
            <td>${badgeStatus(s.status)}</td>
            <td>${acoes}</td>
          </tr>`;
        }).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:red;">${err.message}</td></tr>`;
      }
    }

    function abrirAprovar(id, horasSolicitadas) {
      document.getElementById('id-aprovar').value = id;
      document.getElementById('horas-solicitadas-aprovar').value = horasSolicitadas;
      document.getElementById('horas-validadas').value = horasSolicitadas; // pre-preenche com o valor solicitado
      document.getElementById('obs-aprovar').value = '';
      document.getElementById('modal-aprovar').classList.add('aberto');
    }

    function fecharModalAprovar() {
      document.getElementById('modal-aprovar').classList.remove('aberto');
    }

    async function confirmarAprovar() {
      const id = document.getElementById('id-aprovar').value;
      const horasValidadas = parseInt(document.getElementById('horas-validadas').value);
      const observacao = document.getElementById('obs-aprovar').value.trim();

      if (!horasValidadas || horasValidadas < 1) {
        alert('Informe as horas a validar.');
        return;
      }

      try {
        await solicitacoes.aprovar(id, { cargaHorariaValidada: horasValidadas, observacao });
        fecharModalAprovar();
        carregarSolicitacoes();
      } catch (err) {
        alert('Erro: ' + err.message);
      }
    }

    function abrirRejeitar(id) {
      document.getElementById('id-rejeitar').value = id;
      document.getElementById('obs-rejeitar').value = '';
      document.getElementById('modal-rejeitar').classList.add('aberto');
    }

    function fecharModalRejeitar() {
      document.getElementById('modal-rejeitar').classList.remove('aberto');
    }

    async function confirmarRejeitar() {
      const id = document.getElementById('id-rejeitar').value;
      const obs = document.getElementById('obs-rejeitar').value.trim();
      try {
        await solicitacoes.rejeitar(id, obs);
        fecharModalRejeitar();
        carregarSolicitacoes();
      } catch (err) {
        alert('Erro: ' + err.message);
      }
    }

    document.getElementById('filtro-status').addEventListener('change', carregarSolicitacoes);
    carregarSolicitacoes();
  </script>
</body>
</html>
