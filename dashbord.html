<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard do Coordenador</title>
  <link rel="stylesheet" href="global.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .metricas { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .metrica { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 16px; text-align: center; }
    .metrica span { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
    .metrica strong { font-size: 28px; font-weight: 700; color: var(--text); }
    .metrica.destaque strong { color: #d97706; }
    .metrica.verde strong { color: #16a34a; }
    .metrica.azul strong { color: #2563eb; }
    .graficos { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media(max-width:700px){ .graficos { grid-template-columns: 1fr; } }
    .grafico-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .grafico-card h2 { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: .5px; }
    .recentes-lista { list-style: none; }
    .recentes-lista li { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .recentes-lista li:last-child { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; border: 1px solid; }
    .alerta { background: #fef3c7; border-left: 4px solid #d97706; padding: 12px 16px; border-radius: var(--radius); margin-bottom: 20px; font-size: 14px; color: #92400e; }
    .alerta.ok { background: #d1fae5; border-left-color: #16a34a; color: #065f46; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Dashboard do Coordenador</h1>
    <a href="index.html" id="btn-sair">Sair</a>
  </div>

  <div class="content">
    <div class="alerta" id="alerta-pendentes">Carregando dados...</div>

    <div class="metricas">
      <div class="metrica destaque"><span>Pendentes</span><strong id="m-pendentes">—</strong></div>
      <div class="metrica verde"><span>Aprovadas</span><strong id="m-aprovadas">—</strong></div>
      <div class="metrica"><span>Rejeitadas</span><strong id="m-rejeitadas">—</strong></div>
      <div class="metrica azul"><span>Total Alunos</span><strong id="m-alunos">—</strong></div>
      <div class="metrica azul"><span>Cursos</span><strong id="m-cursos">—</strong></div>
      <div class="metrica verde"><span>Taxa Aprovação</span><strong id="m-taxa">—</strong></div>
      <div class="metrica verde"><span>Horas Validadas</span><strong id="m-horas">—</strong></div>
    </div>

    <div class="graficos">
      <div class="grafico-card">
        <h2>Solicitações por Status</h2>
        <canvas id="grafico-status" height="200"></canvas>
      </div>
      <div class="grafico-card">
        <h2>Evolução Mensal</h2>
        <canvas id="grafico-mensal" height="200"></canvas>
      </div>
    </div>

    <div class="card">
      <h2 style="font-size:14px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;">Últimas Atividades</h2>
      <ul class="recentes-lista" id="lista-recentes">
        <li><span style="color:#888">Carregando...</span></li>
      </ul>
    </div>

    <div class="card" style="margin-top:16px;">
      <h2>Ações Rápidas</h2>
      <div class="btn-group">
        <a href="solicitacoes.html" class="btn btn-primary">Ver Solicitações</a>
        <a href="alunos.html"       class="btn btn-primary">Cadastrar Alunos</a>
        <a href="cursos.html"       class="btn btn-primary">Gerenciar Cursos</a>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    function badgeStatus(status) {
      const cores = {
        pendente:  'color:#92400e;background:#fef3c7;border-color:#fde68a;',
        aprovado:  'color:#065f46;background:#d1fae5;border-color:#6ee7b7;',
        rejeitado: 'color:#991b1b;background:#fee2e2;border-color:#fca5a5;'
      };
      return `<span class="badge" style="${cores[status]||''}">${status}</span>`;
    }

    let graficoStatus = null, graficoMensal = null;

    async function carregarDashboard() {
      try {
        const d = await dashboard.metricas();

        document.getElementById('m-pendentes').textContent  = d.totalPendentes;
        document.getElementById('m-aprovadas').textContent  = d.totalAprovadas;
        document.getElementById('m-rejeitadas').textContent = d.totalRejeitadas;
        document.getElementById('m-alunos').textContent     = d.totalAlunos;
        document.getElementById('m-cursos').textContent     = d.totalCursos;
        document.getElementById('m-taxa').textContent       = d.taxaAprovacao + '%';
        document.getElementById('m-horas').textContent      = d.totalHorasAprovadas + 'h';

        const alerta = document.getElementById('alerta-pendentes');
        if (d.totalPendentes > 0) {
          alerta.textContent = `⚠️  Você tem ${d.totalPendentes} solicitação(ões) pendente(s) de análise!`;
          alerta.className = 'alerta';
        } else {
          alerta.textContent = '✅ Nenhuma solicitação pendente no momento.';
          alerta.className = 'alerta ok';
        }

        // Gráfico de rosca — por status
        const ctxStatus = document.getElementById('grafico-status').getContext('2d');
        if (graficoStatus) graficoStatus.destroy();
        graficoStatus = new Chart(ctxStatus, {
          type: 'doughnut',
          data: {
            labels: ['Pendentes', 'Aprovadas', 'Rejeitadas'],
            datasets: [{
              data: [d.totalPendentes, d.totalAprovadas, d.totalRejeitadas],
              backgroundColor: ['#fbbf24', '#34d399', '#f87171'],
              borderWidth: 0
            }]
          },
          options: { plugins: { legend: { position: 'bottom' } }, cutout: '65%' }
        });

        // Gráfico de linha — evolução mensal
        const ctxMensal = document.getElementById('grafico-mensal').getContext('2d');
        if (graficoMensal) graficoMensal.destroy();
        const meses    = (d.evolucaoMensal || []).map(m => m.mes);
        const totais   = (d.evolucaoMensal || []).map(m => m.total);
        const aprovadas = (d.evolucaoMensal || []).map(m => m.aprovadas);
        graficoMensal = new Chart(ctxMensal, {
          type: 'line',
          data: {
            labels: meses,
            datasets: [
              { label: 'Submetidas', data: totais,    borderColor: '#3b82f6', backgroundColor: '#3b82f620', tension: 0.3, fill: true },
              { label: 'Aprovadas',  data: aprovadas, borderColor: '#10b981', backgroundColor: '#10b98120', tension: 0.3, fill: true }
            ]
          },
          options: {
            plugins: { legend: { position: 'bottom' } },
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
          }
        });

        // Lista de recentes
        const ul = document.getElementById('lista-recentes');
        if (d.atividadesRecentes && d.atividadesRecentes.length > 0) {
          ul.innerHTML = d.atividadesRecentes.map(a => `
            <li>
              <div>
                <div style="font-weight:600;">${a.titulo}</div>
                <div style="color:var(--text-muted);font-size:12px;">${a.aluno} · ${a.categoria} · ${a.cargaHoraria}h</div>
              </div>
              ${badgeStatus(a.status)}
            </li>
          `).join('');
        } else {
          ul.innerHTML = '<li><span style="color:#888">Nenhuma atividade registrada.</span></li>';
        }

      } catch (err) {
        document.getElementById('alerta-pendentes').textContent = '❌ Não foi possível carregar os dados. Verifique se o backend está rodando.';
        console.error(err);
      }
    }

    carregarDashboard();
  </script>
</body>
</html>
