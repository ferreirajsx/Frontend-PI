<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="global.css">
    <title>Minha Área - Aluno</title>
    <style>
      .upload-area {
        border: 2px dashed #2563eb;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        background: #eff6ff;
        cursor: pointer;
        transition: background .2s;
      }
      .upload-area:hover { background: #dbeafe; }
      .arquivo-selecionado {
        border: 1px solid #16a34a;
        border-radius: 8px;
        padding: 12px 16px;
        background: #f0fdf4;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
      }
      .btn-remover { color: #dc2626; background: none; border: none; cursor: pointer; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Painel do Aluno</h1>
        <a href="index.html" style="text-decoration: none; color: #666;">← Voltar ao Início</a>

        <div class="card" style="margin-top: 20px; padding: 20px; border: 1px solid #ccc;">
            <h3>Identificação</h3>
            <div style="display:flex; gap:10px; align-items:flex-end; margin-top:10px;">
              <div style="flex:1;">
                <label style="font-size:13px;font-weight:600;">Selecione seu nome</label>
                <select id="sel-aluno" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-top:4px;">
                  <option value="">Carregando alunos...</option>
                </select>
              </div>
              <button class="btn btn-primary" onclick="carregarMinhasAtividades()" style="white-space:nowrap;">Carregar</button>
            </div>
        </div>

        <div class="card" style="margin-top: 20px; padding: 20px; border: 1px solid #ccc;">
            <h3>Submeter Nova Atividade</h3>
            <div style="display: flex; flex-direction: column; gap: 12px; margin-top:10px;">

                <input type="text" id="titulo" placeholder="Título da Atividade (ex: Palestra de Inovação)" required>

                <div style="display: flex; gap: 10px;">
                    <input type="number" id="cargaHoraria" placeholder="Carga Horária" style="flex: 1;" min="1">
                    <select id="idCategoria" style="flex: 1; padding:12px; border:1px solid #ddd; border-radius:8px;">
                        <option value="">Selecione a Categoria</option>
                    </select>
                </div>

                <textarea id="descricao" placeholder="Breve descrição da atividade" rows="3"
                  style="padding:12px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;"></textarea>

                <!-- Upload do certificado -->
                <div>
                  <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">
                    Certificado em PDF
                    <span style="font-weight:400;color:#6b7280;">(opcional, máx. 5MB)</span>
                  </label>

                  <!-- estado: sem arquivo -->
                  <div id="upload-vazio" class="upload-area" onclick="document.getElementById('input-certificado').click()">
                    <div style="font-size:24px;margin-bottom:6px;">📎</div>
                    <div style="font-weight:600;color:#2563eb;">Clique para anexar o certificado</div>
                    <div style="font-size:12px;color:#6b7280;margin-top:4px;">Apenas arquivos PDF</div>
                  </div>

                  <!-- estado: arquivo selecionado (oculto inicialmente) -->
                  <div id="upload-preenchido" class="arquivo-selecionado" style="display:none;">
                    <div>
                      <div style="font-weight:600;" id="nome-arquivo">—</div>
                      <div style="color:#6b7280;" id="tamanho-arquivo">—</div>
                    </div>
                    <button class="btn-remover" onclick="removerCertificado()" title="Remover">✕</button>
                  </div>

                  <input type="file" id="input-certificado" accept="application/pdf" style="display:none;" onchange="selecionarCertificado(this)">
                </div>

                <p id="msg-envio" style="font-size:0.9rem;"></p>
                <button id="btn-enviar" class="btn btn-primary" onclick="enviarSolicitacao()">
                    Enviar para Avaliação
                </button>
            </div>
        </div>

        <div class="card" style="margin-top: 20px; padding: 20px; border: 1px solid #ccc;">
            <h3>Minhas Atividades Submetidas</h3>
            <div class="tabela-wrap" style="margin-top:10px;">
              <table>
                <thead>
                  <tr>
                    <th>Título</th>
                    <th>Horas</th>
                    <th>Data Envio</th>
                    <th>Status</th>
                    <th>Certificado</th>
                    <th>Observação</th>
                  </tr>
                </thead>
                <tbody id="tabela-minhas">
                  <tr><td colspan="6" style="text-align:center;color:#888;">Selecione seu nome acima.</td></tr>
                </tbody>
              </table>
            </div>
        </div>
    </div>

  <script src="api.js"></script>
  <script>
    // guarda o certificado selecionado em base64
    let certificadoSelecionado = null;

    function formatarBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function selecionarCertificado(input) {
      const arquivo = input.files[0];
      if (!arquivo) return;

      // verifica tamanho (5MB)
      if (arquivo.size > 5 * 1024 * 1024) {
        alert('O arquivo é muito grande. O limite é 5MB.');
        input.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        // pega so o base64 sem o prefixo data:application/pdf;base64,
        const base64 = e.target.result.split(',')[1];
        certificadoSelecionado = {
          nomeArquivo: arquivo.name,
          base64: base64,
          tamanho: arquivo.size
        };

        document.getElementById('nome-arquivo').textContent = '📄 ' + arquivo.name;
        document.getElementById('tamanho-arquivo').textContent = formatarBytes(arquivo.size);
        document.getElementById('upload-vazio').style.display = 'none';
        document.getElementById('upload-preenchido').style.display = 'flex';
      };
      reader.readAsDataURL(arquivo);
    }

    function removerCertificado() {
      certificadoSelecionado = null;
      document.getElementById('input-certificado').value = '';
      document.getElementById('upload-vazio').style.display = 'block';
      document.getElementById('upload-preenchido').style.display = 'none';
    }

    async function inicializar() {
      try {
        const lista = await alunos.listar();
        const sel = document.getElementById('sel-aluno');
        sel.innerHTML = '<option value="">Selecione seu nome</option>';
        lista.forEach(a => {
          const idCurso = a.idCurso && a.idCurso._id ? a.idCurso._id : a.idCurso;
          sel.innerHTML += `<option value="${a._id}" data-curso="${idCurso}">${a.nome}</option>`;
        });
      } catch (err) {
        console.error('Erro ao carregar alunos:', err);
      }

      try {
        const lista = await categorias.listar();
        const sel = document.getElementById('idCategoria');
        lista.forEach(c => {
          sel.innerHTML += `<option value="${c._id}">${c.nome}</option>`;
        });
      } catch (err) {
        console.error('Erro ao carregar categorias:', err);
      }
    }

    async function carregarMinhasAtividades() {
      const sel = document.getElementById('sel-aluno');
      const idAluno = sel.value;
      if (!idAluno) return;

      const tbody = document.getElementById('tabela-minhas');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;">Carregando...</td></tr>';

      try {
        const resultado = await solicitacoes.listarPorAluno(idAluno);
        const lista = resultado.atividades || resultado;

        if (lista.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;">Nenhuma atividade enviada ainda.</td></tr>';
          return;
        }
        const cores = {
          pendente:  'color:#92400e;',
          aprovado:  'color:#065f46;',
          rejeitado: 'color:#991b1b;'
        };
        tbody.innerHTML = lista.map(a => {
          const cor = cores[(a.status || '').toLowerCase()] || '';
          const dataEnvio = a.dataEnvio ? new Date(a.dataEnvio).toLocaleDateString('pt-BR') : '—';
          const observacao = a.avaliacao && a.avaliacao.observacao ? a.avaliacao.observacao : '—';
          const temCertificado = a.certificado && a.certificado.nomeArquivo;
          const linkCert = temCertificado
            ? `<a href="${API_URL}/solicitacoes/${a._id}/certificado" target="_blank" style="color:#2563eb;font-size:12px;">📄 Ver PDF</a>`
            : '<span style="color:#aaa;font-size:12px;">—</span>';

          return `
            <tr>
              <td>${a.titulo}</td>
              <td>${a.cargaHoraria}h</td>
              <td>${dataEnvio}</td>
              <td style="font-weight:bold;${cor}">${a.status}</td>
              <td>${linkCert}</td>
              <td>${observacao}</td>
            </tr>`;
        }).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:red;">${err.message}</td></tr>`;
      }
    }

    async function enviarSolicitacao() {
      const msg = document.getElementById('msg-envio');
      const sel = document.getElementById('sel-aluno');
      const idAluno = sel.value;
      const opt = sel.options[sel.selectedIndex];
      const idCurso = opt ? opt.getAttribute('data-curso') : null;

      const dados = {
        titulo:       document.getElementById('titulo').value.trim(),
        descricao:    document.getElementById('descricao').value.trim(),
        cargaHoraria: parseInt(document.getElementById('cargaHoraria').value),
        idAluno:      idAluno,
        idCurso:      idCurso,
        idCategoria:  document.getElementById('idCategoria').value
      };

      if (!dados.idAluno) {
        msg.textContent = 'Selecione seu nome primeiro.';
        msg.style.color = 'red';
        return;
      }
      if (!dados.titulo || !dados.cargaHoraria || !dados.idCategoria || !dados.idCurso) {
        msg.textContent = 'Preencha todos os campos obrigatórios.';
        msg.style.color = 'red';
        return;
      }

      // adiciona o certificado se tiver
      if (certificadoSelecionado) {
        dados.certificado = certificadoSelecionado;
      }

      const btn = document.getElementById('btn-enviar');
      btn.textContent = 'Enviando...';
      btn.disabled = true;

      try {
        await solicitacoes.criar(dados);
        msg.textContent = '✅ Atividade enviada! O coordenador será notificado por e-mail.';
        msg.style.color = 'green';
        document.getElementById('titulo').value = '';
        document.getElementById('cargaHoraria').value = '';
        document.getElementById('descricao').value = '';
        document.getElementById('idCategoria').value = '';
        removerCertificado();
        carregarMinhasAtividades();
      } catch (err) {
        msg.textContent = 'Erro: ' + err.message;
        msg.style.color = 'red';
      }

      btn.textContent = 'Enviar para Avaliação';
      btn.disabled = false;
    }

    inicializar();
  </script>
</body>
</html>
